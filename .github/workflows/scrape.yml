name: Build Infinite Craft DB
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scrape_to_sqlite.py
      
      - name: Split DB into chunks
        run: |
          split -b 50M infinite_craft.db.gz part_
          ls -lh part_*
      
      - name: Commit and Push chunks
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add part_*
          git rm --cached infinite_craft.db.gz 2>/dev/null || true
          rm -f infinite_craft.db infinite_craft.db.gz
          git commit -m "Auto-update DB chunks $(date +%Y-%m-%d)" || echo "No changes"
          git push
