name: Build Infinite Craft DB
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scrape_to_sqlite.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add infinite_craft.db.gz
          git commit -m "Auto-update DB $(date +%Y-%m-%d)" || echo "No changes"
          git push
